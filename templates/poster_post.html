{% extends "base.html" %}
{% block title %}Post Event | Events@NYU{% endblock %}
{% block content %}
  <p class="event-detail__back">
    <a class="topbar__link" href="{{ url_for('dashboard') }}">← Dashboard</a>
  </p>

  <section class="auth-page poster-page">
    <h2 class="auth-page__heading">Post Event</h2>

    {% if get_flashed_messages() %}
      <ul class="auth-flash">
        {% for message in get_flashed_messages() %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form class="auth-form poster-form" method="POST" action="{{ url_for('poster_post') }}">
      <label class="auth-form__label" for="title">Event Title</label>
      <input class="auth-form__input" id="title" name="title" type="text" placeholder="Event Title" required>

      <label class="auth-form__label" for="description">Description</label>
      <textarea class="auth-form__input poster-form__textarea" id="description" name="description" placeholder="Event description" rows="4"></textarea>

      <label class="auth-form__label" for="event-date">Date</label>
      <input class="auth-form__input" id="event-date" name="date" type="date" required>

      <label class="auth-form__label" for="event-time">Time</label>
      <input class="auth-form__input poster-form__time" id="event-time" name="time" type="time" required>

      <label class="auth-form__label" for="location">Event Location</label>
      <input class="auth-form__input" id="location" name="location" type="text" placeholder="Event location" required>

      <label class="auth-form__label" for="capacity">Capacity (optional)</label>
      <input class="auth-form__input" id="capacity" name="capacity" type="number" min="1" placeholder="Leave blank for unlimited">

      <label class="auth-form__label" for="category">Category</label>
      <select class="auth-form__input" id="category" name="category" required>
        <option value="Academic">Academic</option>
        <option value="Arts">Arts</option>
        <option value="Sports">Sports</option>
        <option value="Social">Social</option>
        <option value="Other">Other</option>
      </select>

      <button class="auth-form__submit" type="submit">Post Event</button>
    </form>
  </section>
{% endblock %}
